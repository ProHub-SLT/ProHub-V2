name: Deploy ProHub-V2 to VM
'on':
  push:
    branches:
      - main
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Restore
        run: dotnet restore ProHub/ProHub.csproj
      - name: Build
        run: dotnet build ProHub/ProHub.csproj -c Release --no-restore
      - name: Publish
        run: dotnet publish ProHub/ProHub.csproj -c Release -o publish --no-build
      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: '${{ secrets.PROXMOX_SSH_KEY }}'
      - name: Add server to known_hosts
        run: >
          mkdir -p ~/.ssh

          ssh-keyscan -p "${{ secrets.PROXMOX_PORT }}" "${{ secrets.PROXMOX_HOST
          }}" >> ~/.ssh/known_hosts
      - name: Test SSH connection
        run: |
          ssh -p "${{ secrets.PROXMOX_PORT }}" \
            "${{ secrets.PROXMOX_USER }}@${{ secrets.PROXMOX_HOST }}" \
            "echo SSH_OK"
      - name: Ensure deploy directory exists
        run: |
          ssh -p "${{ secrets.PROXMOX_PORT }}" \
            "${{ secrets.PROXMOX_USER }}@${{ secrets.PROXMOX_HOST }}" \
            "mkdir -p '${{ secrets.DEPLOY_PATH }}'"
      - name: Sync published files to server (fast)
        run: |
          rsync -az --delete \
            -e "ssh -p ${{ secrets.PROXMOX_PORT }}" \
            publish/ \
            "${{ secrets.PROXMOX_USER }}@${{ secrets.PROXMOX_HOST }}:${{ secrets.DEPLOY_PATH }}/"
      - name: Restart service (no password)
        run: |
          ssh -p "${{ secrets.PROXMOX_PORT }}" \
            "${{ secrets.PROXMOX_USER }}@${{ secrets.PROXMOX_HOST }}" \
            "sudo -n systemctl restart '${{ secrets.SERVICE_NAME }}' && sudo -n systemctl is-active '${{ secrets.SERVICE_NAME }}'"
