name: Deploy ProHub-V2 to VM
'on':
  push:
    branches:
      - main
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Restore
        run: dotnet restore ProHub/ProHub.csproj
      - name: Build
        run: dotnet build ProHub/ProHub.csproj -c Release --no-restore
      - name: Publish
        run: dotnet publish ProHub/ProHub.csproj -c Release -o publish --no-build
      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: '${{ secrets.PROXMOX_SSH_KEY }}'
      - name: Add server to known_hosts
        env:
          HOST: '${{ secrets.PROXMOX_HOST }}'
          PORT: '${{ secrets.PROXMOX_PORT }}'
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$PORT" -H "$HOST" >> ~/.ssh/known_hosts
      - name: Test SSH connection
        env:
          HOST: '${{ secrets.PROXMOX_HOST }}'
          PORT: '${{ secrets.PROXMOX_PORT }}'
          USER: '${{ secrets.PROXMOX_USER }}'
        run: |
          ssh -p "$PORT" "$USER@$HOST" "echo SSH_OK"
      - name: Ensure deploy directory exists
        env:
          HOST: '${{ secrets.PROXMOX_HOST }}'
          PORT: '${{ secrets.PROXMOX_PORT }}'
          USER: '${{ secrets.PROXMOX_USER }}'
          DEPLOY_PATH: '${{ secrets.DEPLOY_PATH }}'
        run: |
          ssh -p "$PORT" "$USER@$HOST" "mkdir -p '$DEPLOY_PATH'"
      - name: Sync published files to server (fast)
        env:
          HOST: '${{ secrets.PROXMOX_HOST }}'
          PORT: '${{ secrets.PROXMOX_PORT }}'
          USER: '${{ secrets.PROXMOX_USER }}'
          DEPLOY_PATH: '${{ secrets.DEPLOY_PATH }}'
        run: >
          rsync -az --delete -e "ssh -p $PORT" publish/
          "$USER@$HOST:$DEPLOY_PATH/"
      - name: Restart service (no password)
        env:
          HOST: '${{ secrets.PROXMOX_HOST }}'
          PORT: '${{ secrets.PROXMOX_PORT }}'
          USER: '${{ secrets.PROXMOX_USER }}'
          SERVICE: '${{ secrets.SERVICE_NAME }}'
        run: >
          ssh -p "$PORT" "$USER@$HOST" "sudo -n /usr/bin/systemctl restart
          '$SERVICE'"

          ssh -p "$PORT" "$USER@$HOST" "/usr/bin/systemctl is-active --quiet
          '$SERVICE' && echo SERVICE_OK"
