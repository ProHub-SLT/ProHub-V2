name: Deploy ProHub-V2 to VM
'on':
  push:
    branches:
      - main
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Restore
        run: dotnet restore ProHub/ProHub.csproj
      - name: Build
        run: dotnet build ProHub/ProHub.csproj -c Release --no-restore
      - name: Publish
        run: dotnet publish ProHub/ProHub.csproj -c Release -o publish --no-build
      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.PROXMOX_SSH_KEY }}
      - name: Copy published files to server
        env:
          HOST: '${{ secrets.PROXMOX_HOST }}'
          PORT: '${{ secrets.PROXMOX_PORT }}'
          USER: '${{ secrets.PROXMOX_USER }}'
          DEPLOY_PATH: '${{ secrets.DEPLOY_PATH }}'
        run: >
          ssh -o StrictHostKeyChecking=no -p "$PORT" "$USER@$HOST" "mkdir -p
          $DEPLOY_PATH"

          scp -o StrictHostKeyChecking=no -P "$PORT" -r publish/*
          "$USER@$HOST:$DEPLOY_PATH"
      - name: Restart service
        env:
          HOST: '${{ secrets.PROXMOX_HOST }}'
          PORT: '${{ secrets.PROXMOX_PORT }}'
          USER: '${{ secrets.PROXMOX_USER }}'
          SERVICE: '${{ secrets.SERVICE_NAME }}'
        run: >
          ssh -o StrictHostKeyChecking=no -p "$PORT" "$USER@$HOST" "sudo
          systemctl restart $SERVICE"

          ssh -o StrictHostKeyChecking=no -p "$PORT" "$USER@$HOST" "sudo
          systemctl status $SERVICE --no-pager"
