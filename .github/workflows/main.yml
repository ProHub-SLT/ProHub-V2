name: Deploy to Proxmox VM

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0'

      - name: Restore dependencies
        run: dotnet restore ProHub/ProHub.csproj

      - name: Build
        run: dotnet build ProHub/ProHub.csproj -c Release --no-restore

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: \${{ secrets.PROXMOX_HOST }}
          port: \${{ secrets.PROXMOX_PORT }}
          username: \${{ secrets.PROXMOX_USER }}
          key: \${{ secrets.PROXMOX_SSH_KEY }}
          script: |
            echo "🚀 Starting ProHub Deployment"
            echo "Time: \$(date)"
            
            # 1. Navigate to project directory
            cd /home/abc/ProHub-v3
            
            # 2. Pull latest code from GitHub
            echo "📥 Pulling latest code from GitHub..."
            git fetch origin
            git reset --hard origin/main
            
            # 3. Publish application
            echo "🏗️ Building and Publishing..."
            # Using the deployment path defined in your GitHub Secrets
            dotnet publish ProHub/ProHub.csproj -c Release -o \${{ secrets.DEPLOY_PATH }}
            
            # 4. Restart service
            echo "🔄 Restarting service..."
            # Note: Ensure the user 'abc' has NOPASSWD sudo for systemctl restart
            sudo systemctl restart \${{ secrets.SERVICE_NAME }}
            
            # 5. Verify status
            echo "�� Checking status..."
            systemctl status \${{ secrets.SERVICE_NAME }} --no-pager | grep "Active:"
            
            echo "🎉 Deployment Complete!"
